<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Impressões 3D{% endblock %}</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1d2433;
      --muted: #667085;
      --primary: #3a5bff;
      --primary-strong: #2746e5;
      --danger: #c73d50;
      --ok: #0e9f6e;
      --warning: #d97706;
      --border: #e5e7eb;
      --shadow: 0 12px 30px rgba(23, 32, 56, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.2px;
      color: var(--text);
      text-decoration: none;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .menu a,
    .btn-link {
      text-decoration: none;
      color: #2d3a5f;
      border: 1px solid transparent;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      cursor: pointer;
    }

    .menu a:hover,
    .btn-link:hover {
      background: #eef2ff;
      color: #1f2b53;
    }

    .btn,
    button {
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .btn:hover,
    button:hover {
      background: var(--primary-strong);
    }

    .btn-secondary {
      background: #eef2ff;
      color: #1f2b53;
    }

    .btn-secondary:hover {
      background: #dde4ff;
    }

    .btn-danger {
      background: #ffe8ec;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #ffd5de;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .muted { color: var(--muted); }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #243777;
      font-size: 12px;
      font-weight: 600;
    }

    .message-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      display: grid;
      gap: 8px;
    }

    .message {
      background: #eef2ff;
      border: 1px solid #d9e1ff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .message.success { background: #ecfdf5; border-color: #b9f0d8; color: var(--ok); }
    .message.error { background: #fff1f2; border-color: #ffd5dc; color: var(--danger); }
    .message.warning { background: #fffbeb; border-color: #fee8b0; color: var(--warning); }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    input[type="number"],
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
    }

    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .summary {
      margin-top: 16px;
      background: #eef2ff;
      border: 1px solid #c9d4ff;
      border-radius: 12px;
      padding: 14px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{% url 'home' %}" class="brand">Facens Store</a>
      <nav class="menu">
        {% if user.is_authenticated %}
          <a href="{% url 'painel' %}">Painel</a>
          <a href="{% url 'catalogo' %}">Catálogo</a>
          <a href="{% url 'carrinho' %}">Carrinho</a>
          <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button class="btn-link" type="submit">Sair</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Entrar</a>
          <a href="{% url 'registro' %}">Registrar</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="page">
    {% if messages %}
      <ul class="message-list">
        {% for message in messages %}
          <li class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
